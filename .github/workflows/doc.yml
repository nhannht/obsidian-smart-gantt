# Build check only. The site is self-hosted on sg-hs (nginx + certbot) at
# https://smartgantt.nhannht.io.vn, and sg-hs SSH is reachable over Tailscale
# only, so GitHub runners cannot deploy. Deploy manually from a Tailscale
# machine:
#   cd site && bun install && bun run build \
#     && rsync -az --delete dist/ sg-hs:/var/www/smartgantt.nhannht.io.vn/
# The old obsidian-smart-gantt.pages.dev project now serves a permanent 301
# to the new domain.

name: site build check

on:
    push:
        branches:
            - docs

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            -   name: check out
                uses: actions/checkout@v4

            -   name: set up bun
                uses: oven-sh/setup-bun@v2

            -   name: install
                working-directory: site
                run: bun install --frozen-lockfile

            -   name: build
                working-directory: site
                run: bun run build
